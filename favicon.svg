<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark space background -->
  <rect width="32" height="32" rx="7" fill="#030308"/>
  <!-- Constellation lines -->
  <line x1="8"  y1="9"  x2="16" y2="16" stroke="#7C6FFF" stroke-width="0.9" opacity="0.5"/>
  <line x1="24" y1="9"  x2="16" y2="16" stroke="#7C6FFF" stroke-width="0.9" opacity="0.5"/>
  <line x1="7"  y1="22" x2="16" y2="16" stroke="#7C6FFF" stroke-width="0.9" opacity="0.4"/>
  <line x1="25" y1="21" x2="16" y2="16" stroke="#7C6FFF" stroke-width="0.9" opacity="0.4"/>
  <line x1="16" y1="5"  x2="16" y2="16" stroke="#7C6FFF" stroke-width="0.9" opacity="0.4"/>
  <!-- Outer star nodes -->
  <circle cx="8"  cy="9"  r="1.4" fill="#9D94FF" opacity="0.75"/>
  <circle cx="24" cy="9"  r="1.1" fill="#9D94FF" opacity="0.6"/>
  <circle cx="7"  cy="22" r="1.1" fill="#9D94FF" opacity="0.55"/>
  <circle cx="25" cy="21" r="1.4" fill="#9D94FF" opacity="0.65"/>
  <circle cx="16" cy="5"  r="1.1" fill="#9D94FF" opacity="0.6"/>
  <!-- Centre glow -->
  <circle cx="16" cy="16" r="4.5" fill="#7C6FFF" opacity="0.18"/>
  <!-- Centre star core -->
  <circle cx="16" cy="16" r="2.4" fill="#ffffff"/>
  <circle cx="16" cy="16" r="1.4" fill="#9D94FF"/>
</svg>
